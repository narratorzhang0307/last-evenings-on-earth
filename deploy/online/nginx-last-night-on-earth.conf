# last-evenings-on-earth — lastnightonearth.throughtheglass.art
#
# 放到服务器 /etc/nginx/conf.d/ 下，然后：
#   nginx -t && nginx -s reload
#
# 拓扑：
#   浏览器 ─https─▶ nginx :443 ─┬─ /        静态托管 dist/（SPA，未命中回退 index.html）
#         （Certbot 证书）       └─ /api/*  反代 → node server.mjs :3010（照片元数据服务）
#                 :80 → 301 https
#
# 隔离：独立 server_name + 独立内网端口 3010，与服务器上其它站点互不影响。
# 证书行由 certbot --nginx 自动写入；手动建站时先用 80 段跑通，再 certbot 签发。

server {
    server_name lastnightonearth.throughtheglass.art;

    # 前端静态资源（本机 npm run build 后 rsync 到此目录）
    root  /root/last-night-on-earth/dist;
    index index.html;

    # SPA：路由交给前端，未命中的路径回退 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 照片元数据接口反代到本机 node 服务
    location /api/ {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/lastnightonearth.throughtheglass.art/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/lastnightonearth.throughtheglass.art/privkey.pem; # managed by Certbot
    include             /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = lastnightonearth.throughtheglass.art) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name lastnightonearth.throughtheglass.art;
    return 404; # managed by Certbot
}
